<svg width="1400" height="225" viewBox="0 0 1400 225" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Background base gradient -->
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081223"/>
      <stop offset="55%" stop-color="#0a1830"/>
      <stop offset="100%" stop-color="#081223"/>
    </linearGradient>

    <!-- Animated blue -> purple wash -->
    <linearGradient id="animWash" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.35">
        <animate attributeName="stop-opacity" values="0.15;0.45;0.15" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.35">
        <animate attributeName="stop-opacity" values="0.45;0.15;0.45" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.45;0.15" dur="6s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-200 0; 200 0; -200 0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="borderNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="linkedinGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a4a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#151c33" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="gridPattern" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#2fd0ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlowBlue" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedFrame">
      <rect x="3" y="3" width="1394" height="219" rx="18"/>
    </clipPath>

    <mask id="fadeEdges">
      <rect x="0" y="0" width="1400" height="225" fill="white"/>
      <rect x="0" y="0" width="1400" height="225" fill="url(#edgeFade)"/>
    </mask>

    <radialGradient id="edgeFade" cx="50%" cy="50%" r="75%">
      <stop offset="70%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- ===== BASE ===== -->
  <g clip-path="url(#roundedFrame)">
    <rect x="0" y="0" width="1400" height="225" fill="url(#bgBase)"/>
    <rect x="0" y="0" width="1400" height="225" fill="url(#animWash)"/>

    <!-- tech grid -->
    <rect x="0" y="0" width="1400" height="225" fill="url(#gridPattern)"/>

    <!-- large ambient glows -->
    <circle cx="230" cy="40" r="180" fill="url(#glowBlue)">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="200" r="260" fill="url(#glowPurple)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1220" cy="60" r="150" fill="url(#glowBlue)" opacity="0.5"/>

    <!-- concentric tech rings (right side, behind panel) -->
    <g stroke="#3fd6ff" stroke-opacity="0.18" fill="none">
      <circle cx="1230" cy="120" r="60"/>
      <circle cx="1230" cy="120" r="95"/>
      <circle cx="1230" cy="120" r="130"/>
    </g>
    <g stroke="#3fd6ff" stroke-opacity="0.12" fill="none">
      <circle cx="1230" cy="120" r="130">
        <animateTransform attributeName="transform" type="rotate" from="0 1230 120" to="360 1230 120" dur="40s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- digital scan lines -->
    <g stroke="#38bdf8" stroke-opacity="0.10">
      <line x1="0" y1="55" x2="1400" y2="55" stroke-width="1"/>
      <line x1="0" y1="170" x2="1400" y2="170" stroke-width="1"/>
    </g>

    <!-- moving digital line accent -->
    <line x1="0" y1="0" x2="0" y2="225" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.5">
      <animate attributeName="x1" values="0;1400;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1400;0" dur="9s" repeatCount="indefinite"/>
    </line>

    <!-- particles -->
    <g fill="#7dd3fc">
      <circle cx="120" cy="150" r="1.6">
        <animate attributeName="cy" values="150;130;150" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="300" cy="190" r="1.4">
        <animate attributeName="cy" values="190;165;190" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="480" cy="40" r="1.5">
        <animate attributeName="cy" values="40;65;40" dur="4.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="640" cy="20" r="1.3">
        <animate attributeName="cy" values="20;45;20" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="820" cy="180" r="1.7">
        <animate attributeName="cy" values="180;155;180" dur="5.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;1;0.3" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="950" cy="30" r="1.4">
        <animate attributeName="cy" values="30;55;30" dur="4.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="60" r="1.3">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1360" cy="180" r="1.5">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1300" cy="30" r="1.3">
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="5.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ===== NEON BORDER ===== -->
  <rect x="3" y="3" width="1394" height="219" rx="18" fill="none" stroke="url(#borderNeon)" stroke-width="2" filter="url(#softGlow)"/>
  <rect x="3" y="3" width="1394" height="219" rx="18" fill="none" stroke="#0ea5e9" stroke-width="0.6" stroke-opacity="0.6"/>

  <!-- ===== FUTURISTIC CORNERS ===== -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" filter="url(#softGlow)">
    <path d="M 10 32 L 10 12 L 30 12"/>
    <path d="M 1370 12 L 1390 12 L 1390 32"/>
    <path d="M 1390 193 L 1390 213 L 1370 213"/>
    <path d="M 30 213 L 10 213 L 10 193"/>
  </g>

  <!-- ===== TOP LEFT STATUS ===== -->
  <g font-family="'Courier New', monospace">
    <circle cx="22" cy="24" r="4" fill="#22e07a">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="34" y="28" fill="#7ee6a8" font-size="11" letter-spacing="1.5">NETWORK_STATUS: OPEN // FULL_STACK</text>
    <text x="52" y="44" fill="#9fb4d9" font-size="12" letter-spacing="2" font-weight="bold">ESTABELEÇA UMA NOVA CONEXÃO</text>
  </g>

  <!-- ===== HEADLINE ===== -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="900">
    <rect x="45" y="68" width="7" height="42" fill="#22d3ee" filter="url(#strongGlow)"/>
    <text x="64" y="102" fill="#f5f8ff" font-size="36" letter-spacing="0.5">Conecte-se comigo no
      <tspan fill="url(#linkedinGlow)" filter="url(#textGlowBlue)">LinkedIn</tspan>
    </text>
  </g>

  <!-- ===== SUBTEXT ===== -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="15">
    <text x="52" y="132" fill="#94a3b8">Acredito que grandes oportunidades começam com uma simples conversa.</text>
  </g>

  <!-- ===== BUTTON ===== -->
  <g transform="translate(52,158)">
    <rect x="0" y="0" width="230" height="38" rx="9" fill="url(#btnGrad)" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="230" height="38" rx="9" fill="none" stroke="#93c5fd" stroke-opacity="0.5" stroke-width="1"/>
    <!-- official-style LinkedIn glyph -->
    <g transform="translate(14,7)">
      <rect x="0" y="0" width="24" height="24" rx="4" fill="#ffffff" fill-opacity="0.15"/>
      <rect x="0" y="0" width="24" height="24" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="0.8"/>
      <text x="12" y="17" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="14" fill="#ffffff">in</text>
    </g>
    <text x="48" y="24" font-family="Arial, Helvetica, sans-serif" font-size="14.5" font-weight="bold" fill="#ffffff">Conectar no LinkedIn</text>
    <text x="205" y="24" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#ffffff">→</text>
  </g>

  <!-- ===== RIGHT PANEL (GLASSMORPHISM) ===== -->
  <g transform="translate(985,42)">
    <rect x="0" y="0" width="365" height="120" rx="14" fill="url(#panelGrad)" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="0" y="0" width="365" height="120" rx="14" fill="none" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>

    <text x="18" y="26" font-family="'Courier New', monospace" font-size="12" letter-spacing="1.5" fill="#7dd3fc">CONNECTION_SIGNAL</text>
    <text x="335" y="26" font-family="'Courier New', monospace" font-size="12" fill="#7ee6a8" text-anchor="end">100%</text>

    <!-- signal bars -->
    <g transform="translate(18,40)">
      <rect x="0"  y="26" width="14" height="14" rx="2" fill="#38bdf8" opacity="0.7"/>
      <rect x="20" y="18" width="14" height="22" rx="2" fill="#60a5fa" opacity="0.8"/>
      <rect x="40" y="8"  width="14" height="32" rx="2" fill="#a78bfa"/>
      <rect x="60" y="14" width="14" height="26" rx="2" fill="#8b5cf6" opacity="0.85"/>
      <rect x="80" y="22" width="14" height="18" rx="2" fill="#38bdf8" opacity="0.7"/>
      <rect x="100" y="12" width="14" height="28" rx="2" fill="#22d3ee">
        <animate attributeName="height" values="28;36;28" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="12;4;12" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="120" y="20" width="14" height="20" rx="2" fill="#60a5fa" opacity="0.75"/>
      <rect x="140" y="10" width="14" height="30" rx="2" fill="#a78bfa" opacity="0.9"/>
      <rect x="160" y="24" width="14" height="16" rx="2" fill="#38bdf8" opacity="0.6"/>
    </g>

    <!-- tags -->
    <g font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="bold">
      <rect x="18" y="88" width="82" height="24" rx="6" fill="#0f2745" stroke="#38bdf8" stroke-opacity="0.6"/>
      <text x="59" y="104" text-anchor="middle" fill="#7dd3fc">FRONTEND</text>

      <rect x="108" y="88" width="82" height="24" rx="6" fill="#0f2745" stroke="#38bdf8" stroke-opacity="0.6"/>
      <text x="149" y="104" text-anchor="middle" fill="#7dd3fc">BACKEND</text>

      <rect x="198" y="88" width="70" height="24" rx="6" fill="#0f2745" stroke="#38bdf8" stroke-opacity="0.6"/>
      <text x="233" y="104" text-anchor="middle" fill="#7dd3fc">CLOUD</text>
    </g>
  </g>

  <!-- ===== BOTTOM RIGHT META ===== -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#7a8bab" text-anchor="end" letter-spacing="1">
    <text x="1352" y="188">BUILDING THE NEXT CONNECTION</text>
    <text x="1352" y="203">ID: DEV-2026 // READY</text>
  </g>
</svg>
